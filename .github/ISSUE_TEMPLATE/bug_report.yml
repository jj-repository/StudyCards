name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.01
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [Windows, Linux]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open the app\n2. Do X\n3. See error"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log output
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Additional context
